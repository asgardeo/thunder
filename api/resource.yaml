                  - "booking/online-booking"
                  - "booking/online-booking/web-reservations"
                  - "booking/online-booking/web-reservations/create"
                  - "booking/online-booking/web-reservations/search"
                  - "booking/online-booking/web-reservations/view"
                  - "booking/payments"
                  - "booking/payments/process"
                  - "booking/payments/refund"
        "404":
          description: Resource server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "RES-1003"
                message: "Resource server not found"
                description: "The resource server with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "RES-5000"
                message: "Internal server error"
                description: "An unexpected error occurred while processing the request"

  /resource-servers/{rsId}/resources/{resourceId}/permissions:
    get:
      tags:
        - permissions
      summary: Get derived permissions for specific resource
      description: |
        Returns all derived permissions for the specific resource, including:
        - The resource itself
        - All sub-resources (nested hierarchy)
        - All actions at this resource and sub-resource levels
      parameters:
        - in: path
          name: rsId
          required: true
          schema:
            type: string
            format: uuid
          description: Resource server ID
        - in: path
          name: resourceId
          required: true
          schema:
            type: string
            format: uuid
          description: Resource ID
      responses:
        "200":
          description: List of derived permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourcePermissionListResponse'
              example:
                resourceServerId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                resourceId: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                resourcePath: "booking/reservations"
                permissions:
                  - "booking/reservations"
                  - "booking/reservations/create"
                  - "booking/reservations/read"
                  - "booking/reservations/update"
                  - "booking/reservations/cancel"
        "404":
          description: Resource or resource server not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                resource-not-found:
                  summary: Resource not found
                  value:
                    code: "RES-1008"
                    message: "Resource not found"
                    description: "The resource with the specified id does not exist"
                resource-server-not-found:
                  summary: Resource server not found
                  value:
                    code: "RES-1003"
                    message: "Resource server not found"
                    description: "The resource server with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "RES-5000"
                message: "Internal server error"
                description: "An unexpected error occurred while processing the request"

components:
  parameters:
    limitQueryParam:
      in: query
      name: limit
      required: false
      description: Maximum number of records to return
      schema:
        type: integer
        minimum: 1
        default: 30
    offsetQueryParam:
      in: query
      name: offset
      required: false
      description: Number of records to skip for pagination
      schema:
        type: integer
        minimum: 0
        default: 0

  schemas:
    ResourceServer:
      type: object
      required: [id, name, ouId]
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the resource server
        name:
          type: string
          description: Name of the resource server (used for permission derivation)
        description:
          type: string
          nullable: true
          description: Optional description of the resource server
        identifier:
          type: string
          nullable: true
          description: Optional identifier for authorization requests
        ouId:
          type: string
          format: uuid
          description: ID of the organization unit this resource server belongs to

    CreateResourceServerRequest:
      type: object
      required: [name, ouId]
      properties:
        name:
          type: string
          description: Name of the resource server (used for permission derivation)
        description:
          type: string
          description: Optional description of the resource server
        identifier:
          type: string
          description: Optional identifier for authorization requests
        ouId:
          type: string
          format: uuid
          description: ID of the organization unit this resource server belongs to

    UpdateResourceServerRequest:
      type: object
      required: [name, ouId]
      properties:
        name:
          type: string
          description: Name of the resource server (used for permission derivation)
        description:
          type: string
          description: Optional description of the resource server
        identifier:
          type: string
          description: Optional identifier for authorization requests
        ouId:
          type: string
          format: uuid
          description: ID of the organization unit this resource server belongs to

    Resource:
      type: object
      required: [id, name, resourceServerId]
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the resource
        name:
          type: string
          description: Name of the resource (immutable after creation, used for permission derivation)
        description:
          type: string
          nullable: true
          description: Optional description of the resource
        parent:
          type: string
          format: uuid
          nullable: true
          description: Parent resource ID (null for top-level resources)
        resourceServerId:
          type: string
          format: uuid
          description: ID of the resource server this resource belongs to

    CreateResourceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Name of the resource (will be immutable after creation, used for permission derivation)
        description:
          type: string
          description: Optional description of the resource
        parent:
          type: string
          format: uuid
          nullable: true
          description: Parent resource ID (null for top-level resources)

    UpdateResourceRequest:
      type: object
      properties:
        description:
          type: string
          description: Optional description of the resource
        parent:
          type: string
          format: uuid
          nullable: true
          description: Parent resource ID (null for top-level resources)

    Action:
      type: object
      required: [id, name, resourceServerId]
      properties:
